{% extends 'goals/base.html' %}

{% block title %}Login - WellPath{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="bi bi-box-arrow-in-right mb-3" style="font-size: 2rem;"></i>
            <h2>Welcome Back</h2>
            <p class="mb-0 opacity-75">Sign in to continue your wellness journey</p>
        </div>
        
        <div class="auth-body">
            <form method="post" class="form-modern">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username">
                        <i class="bi bi-person me-2"></i>Username
                    </label>
                    <input type="text" 
                           id="username" 
                           name="username" 
                           class="form-control focus-ring" 
                           placeholder="Enter your username"
                           required>
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="bi bi-lock me-2"></i>Password
                    </label>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           class="form-control focus-ring" 
                           placeholder="Enter your password"
                           required>
                </div>
                
                <div class="d-grid gap-2 mb-4">
                    <button type="submit" class="btn btn-primary-modern btn-modern">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Sign In
                    </button>
                </div>
                
                <div class="text-center">
                    <a href="#" class="text-decoration-none">
                        <small>Forgot your password?</small>
                    </a>
                </div>
            </form>
        </div>
        
        <div class="auth-footer">
            <p class="mb-0">
                <small>Don't have an account? 
                    <a href="{% url 'register' %}">Create one here</a>
                </small>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Add subtle animation to the auth card
    const authCard = document.querySelector('.auth-card');
    if (authCard) {
        authCard.style.opacity = '0';
        authCard.style.transform = 'translateY(20px)';
        
        setTimeout(() => {
            authCard.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
            authCard.style.opacity = '1';
            authCard.style.transform = 'translateY(0)';
        }, 100);
    }
});
</script>
{% endblock %}
